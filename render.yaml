services:
  - type: web
    name: world-cup-intelligence-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .[dev]
    startCommand: uvicorn world_cup_intelligence.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: WCI_ACTIVE_TOURNAMENT
        value: world_cup_2026
      - key: WCI_LOG_LEVEL
        value: INFO
      - key: WCI_USE_DEMO_DATA
        value: "false"
      - key: FOOTBALL_DATA_API_TOKEN
        sync: false
      - key: MLFLOW_TRACKING_URI
        sync: false
